<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantastic Hotel - Rooms and Rates</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: #f2f2f2;
    }  
header {
      background: #081B5A;
      color: white;
      padding: 20px 40px;
      text-align: center;
}
    nav {
      text-align: center;
      margin-top: 15px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-size: 18px;
    }
    nav a:hover {
      color: orange;
    }
    
    .title {
      text-align: center;
      font-size: 58px;
      margin: 10px 0 20px;
      font-weight: 500;
      position: static;
    }
    .rooms {
      display: flex;
      justify-content: center;
      gap: 8SSS0px;
      padding: 5px 20px 30px;
      flex-wrap: wrap;
    }
    .card {
      background: #d9d9d9;
      width: 300px;
      text-align: center;
      padding-bottom: 20px;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .room-name {
      background: #071a5c;
      color: white;
      width: 150px;
      margin: -10px auto 15px;
      padding: 10px;
      font-size: 18px;
    }
    .stars {
      font-size: 28px;
      margin-bottom: 15px;
    }
    .bottom {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-top: 10px;
    }
    .price {
      font-size: 30px;
      font-weight: bold;
    }
    .price span {
      color: red;
      font-size: 20px;
    }

    .btn {
      background: orange;
      color: black;
      text-decoration: none;
      padding: 12px 25px;
      font-size: 16px;
      display: inline-block;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <i style="font-size: 40px;">FANTASTIC <span style="color: orange; font-size: 40px;">HOTEL MANAGEMENT SYSTEM</span></i>
    </div>
    <nav>
 <a href="home.html">Home</a>
<a href="about us.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="Rooms.html">Room</a>
<a href="contact.html">Contact Us</a>
<a href="reservation.html">Reservations</a>
    </nav>
  </header>
  <h1 class="title">Rooms And Rates </h1>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<button id="onBtn" onclick="turnOnNightMode()">
  <i class="fa-solid fa-moon"></i>
</button>
<button id="offBtn"
onclick="turnOffNightMode()"
style="display:none;">
  <i class="fa-solid fa-sun"></i>
</button>
  <section class="rooms">
    <div class="card">
      <img src="j16.jpg" alt="Room">
      <div class="room-name">Deluxe Room</div>
      <div class="stars">★★★★☆</div>
      <div class="bottom">
        <div class="price"><span>$</span> 300</div>
        <a href="#" class="btn" style="color: text-ali;">Book Now</a>
      </div>
    </div>
    <div class="card">
      <img src="p11.png" alt="Pool Room">
      <div class="room-name">Deluxe Room</div>
      <div class="stars">★★★★☆</div>
      <div class="bottom">
        <div class="price"><span>$</span> 250</div>
        <a href="#" class="btn">Book Now</a>
      </div>
    </div>
    <div class="card">
      <img src="j18.png" alt="Room">
      <div class="room-name">Deluxe Room</div>
      <div class="stars">★★★★☆</div>
      <div class="bottom">
        <div class="price"><span>$</span> 200</div>
        <a href="#" class="btn">Book Now</a>
      </div>
    </div>
  </section>
</body>
</html>
